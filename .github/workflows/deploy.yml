name: Deploy site

on:
  push:
    branches: [main, react-liquid-glass]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No package-lock.json is committed (this repo was authored without a
      # local Node toolchain), so use `npm install` rather than `npm ci`.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deploy ONLY from main, so pushing the react-liquid-glass branch just
  # verifies the build compiles and does not touch the live site.
  # Cutover = merge the branch into main (after switching Pages source to
  # "GitHub Actions" in repo Settings).
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
